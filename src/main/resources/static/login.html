<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>图书管理系统登录</title>
    <style>
        .login-box{width: 300px;margin: 150px auto;padding: 20px;border: 1px solid #ccc;}
        input{width: 100%;margin: 10px 0;padding: 8px;}
        button{width: 100%;padding: 10px;background: #007bff;color: white;border: none;}
    </style>
</head>
<body>
<div class="login-box">
    <h2>系统登录</h2>
    <input type="text" id="username" placeholder="用户名"><br>
    <input type="password" id="password" placeholder="密码"><br>
    <button onclick="login()">登录</button>
</div>

<script src="https://cdn.bootcdn.net/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
<script>
    function login() {
        let username = $("#username").val();
        let password = $("#password").val();

        $.post("/login", {username: username, password: password}, function (res) {
            if (res.code === 200) {
                alert("登录成功");
                location.href = "/index.html"; // 跳主页
            } else {
                alert(res.msg);
            }
        })
    }
</script>
</body>
</html>
