<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>登录</title>
    <script src="https://cdn.bootcdn.net/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #f5f5f5;
        }
        .login-box {
            width: 300px;
            padding: 30px;
            border: 1px solid #ccc;
            border-radius: 8px;
            background-color: white;
        }
        input {
            width: 100%;
            margin: 10px 0;
            padding: 10px;
            box-sizing: border-box;
        }
        button {
            width: 100%;
            padding: 10px;
            background: #007bff;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }
        h2 {
            text-align: center;
            margin: 0;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>
<div class="login-box">
    <h2>图书管理系统登录</h2>
    <input type="text" id="username" placeholder="用户名">
    <input type="password" id="password" placeholder="密码">
    <button onclick="login()">登录</button>
</div>

<script>
    function login() {
        let username = $("#username").val().trim();
        let password = $("#password").val().trim();
        if (!username || !password) {
            alert("请输入用户名和密码");
            return;
        }
        $.post("/login", {username, password}, function (res) {
            if (res.code === 200) {
                // 登录成功，直接跳转到主页面
                location.href = "/index.html";
            } else {
                alert(res.msg);
            }
        });
    }
</script>
</body>
</html>
